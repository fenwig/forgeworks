<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap');
  :root{
    --tmi-bg-deep:#0a0804;--tmi-bg-panel:#0f0d09;--tmi-bg-card:#141109;--tmi-bg-hover:#1a1610;
    --tmi-gold:#c8a84b;--tmi-gold-bright:#e8c96a;--tmi-gold-dim:#8a7030;--tmi-gold-dark:#5a4a20;
    --tmi-gold-glow:rgba(200,168,75,0.12);
    --tmi-text-primary:#ffffff;--tmi-text-secondary:#d0c4b0;--tmi-text-dim:#90806e;
    --tmi-border:rgba(200,168,75,0.25);--tmi-border-dim:rgba(200,168,75,0.1);
    --tmi-danger:#cc3333;--tmi-success:#5a9955;--tmi-warning:#cc8800;--tmi-steel:#8a9aaa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--tmi-bg-deep);color:var(--tmi-text-primary);font-family:'Exo 2',sans-serif;}

  /* WIDTH CAP */
  .page-wrap{max-width:1200px;}

  /* HEADER */
  .mod-header{background:var(--tmi-bg-panel);border-bottom:1px solid var(--tmi-border-dim);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
  .mod-eyebrow{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--tmi-gold-dim);text-transform:uppercase;margin-bottom:2px;}
  .mod-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}

  /* STATS BAR */
  .stats-bar{background:var(--tmi-bg-panel);border-bottom:1px solid var(--tmi-border-dim);padding:8px 18px;display:flex;gap:24px;align-items:center;}
  .stat-block{display:flex;flex-direction:column;}
  .stat-val{font-family:'Share Tech Mono',monospace;font-size:17px;color:var(--tmi-gold);}
  .stat-lbl{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--tmi-text-dim);text-transform:uppercase;}
  .stat-div{width:1px;height:28px;background:var(--tmi-border-dim);}

  /* TABS */
  .tab-bar{background:var(--tmi-bg-panel);border-bottom:1px solid var(--tmi-border);display:flex;}
  .tab{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:10px 18px;cursor:pointer;color:var(--tmi-text-secondary);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
  .tab:hover{color:var(--tmi-text-primary);}
  .tab.active{color:var(--tmi-gold);border-bottom-color:var(--tmi-gold);}
  .tab-count{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-gold-dim);background:var(--tmi-gold-glow);border:1px solid var(--tmi-border-dim);padding:1px 6px;margin-left:6px;}
  .view{display:none;}
  .view.active{display:block;}

  /* SHARED */
  .form-select{background:var(--tmi-bg-card);border:1px solid var(--tmi-border-dim);color:var(--tmi-text-primary);font-family:'Share Tech Mono',monospace;font-size:14px;padding:6px 10px;outline:none;transition:border-color 0.15s;width:100%;}
  .form-select:focus{border-color:var(--tmi-border);}
  .form-select option{background:var(--tmi-bg-panel);}
  .filter-btn{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--tmi-text-secondary);background:transparent;border:1px solid var(--tmi-border-dim);padding:5px 12px;cursor:pointer;text-transform:uppercase;transition:all 0.15s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);white-space:nowrap;}
  .filter-btn:hover{border-color:var(--tmi-border);color:var(--tmi-text-primary);}
  .filter-btn.active{background:var(--tmi-gold-glow);border-color:var(--tmi-gold);color:var(--tmi-gold);}

  /* ACTION BUTTONS */
  .action-btn{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--tmi-text-secondary);background:transparent;border:1px solid var(--tmi-border-dim);padding:5px 12px;cursor:pointer;text-transform:uppercase;transition:all 0.15s;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);white-space:nowrap;}
  .action-btn:hover{border-color:var(--tmi-border);color:var(--tmi-gold);}
  .action-btn.advance{border-color:var(--tmi-gold-dark);color:var(--tmi-gold-dim);}
  .action-btn.advance:hover{border-color:var(--tmi-gold);color:var(--tmi-gold);background:var(--tmi-gold-glow);}
  .action-btn.deliver{border-color:rgba(90,153,85,0.35);color:var(--tmi-success);}
  .action-btn.deliver:hover{border-color:rgba(90,153,85,0.6);background:rgba(90,153,85,0.1);}
  .action-btn.revert{border-color:var(--tmi-border-dim);color:var(--tmi-text-dim);}
  .action-btn.revert:hover{border-color:var(--tmi-steel);color:var(--tmi-steel);}
  .action-btn.delete-order{border-color:rgba(204,51,51,0.3);color:var(--tmi-text-dim);}
  .action-btn.delete-order:hover{border-color:rgba(204,51,51,0.6);color:var(--tmi-danger);}
  .action-btn.confirm-delete{border-color:rgba(204,51,51,0.6);color:var(--tmi-danger);background:rgba(204,51,51,0.08);}
  .action-btn.confirm-delete:hover{background:rgba(204,51,51,0.15);}
  .detail-actions{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--tmi-border-dim);}

  /* STATUS PILLS */
  .status-pill{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:1px;padding:2px 8px;text-transform:uppercase;}
  .status-inprogress{border:1px solid rgba(204,136,0,0.4);color:var(--tmi-warning);background:rgba(204,136,0,0.08);}
  .status-readytocraft{border:1px solid rgba(200,168,75,0.4);color:var(--tmi-gold);background:var(--tmi-gold-glow);}
  .status-readytodeliver{border:1px solid rgba(90,153,85,0.4);color:var(--tmi-success);background:rgba(90,153,85,0.08);}
  .status-delivered{border:1px solid rgba(90,153,85,0.3);color:var(--tmi-success);background:rgba(90,153,85,0.05);}

  /* QUALITY BADGE */
  .qual-badge{font-family:'Share Tech Mono',monospace;font-size:14px;padding:2px 9px;border:1px solid;}
  .qual-700{border-color:var(--tmi-gold-dark);color:var(--tmi-gold-dim);}
  .qual-800{border-color:var(--tmi-border);color:var(--tmi-gold);}
  .qual-900{border-color:rgba(232,201,106,0.5);color:var(--tmi-gold-bright);}

  /* MAT READY BADGE */
  .mat-ready{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-success);border:1px solid rgba(90,153,85,0.35);padding:2px 9px;background:rgba(90,153,85,0.06);}

  /* ORDER BAR */
  .order-bar{background:var(--tmi-bg-panel);border-bottom:1px solid var(--tmi-border-dim);padding:8px 18px;display:flex;align-items:center;gap:8px;}
  .bar-label{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--tmi-text-dim);text-transform:uppercase;}

  /* ORDER ROWS */
  .order-list{padding:10px 18px;display:flex;flex-direction:column;gap:5px;}
  .order-row{background:var(--tmi-bg-card);border:1px solid var(--tmi-border-dim);border-left:2px solid var(--tmi-gold-dark);transition:all 0.15s;}
  .order-row.s-inprogress{border-left-color:var(--tmi-warning);}
  .order-row.s-readytocraft{border-left-color:var(--tmi-gold);}
  .order-row.s-readytodeliver{border-left-color:var(--tmi-success);}
  .order-row.s-delivered{border-left-color:var(--tmi-success);opacity:0.6;}
  .order-row:hover{background:var(--tmi-bg-hover);}
  .order-header{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .order-id{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-dim);min-width:46px;}
  .order-customer{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tmi-text-primary);min-width:130px;}
  .order-item{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--tmi-text-secondary);flex:1;text-transform:uppercase;}
  .order-deadline{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-dim);min-width:90px;text-align:right;}
  .order-deadline.near{color:var(--tmi-warning);}
  .order-deadline.overdue{color:var(--tmi-danger);}
  .order-actions{display:flex;gap:5px;align-items:center;margin-left:6px;}
  .expand-arrow{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-dim);margin-left:4px;}
  .order-empty{padding:30px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-dim);letter-spacing:1px;}

  /* ORDER DETAIL */
  .order-detail{display:none;background:var(--tmi-bg-panel);border-top:1px solid var(--tmi-border-dim);padding:12px 14px;}
  .order-detail.open{display:block;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:12px;}
  .detail-field{display:flex;flex-direction:column;gap:2px;}
  .detail-lbl{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--tmi-text-dim);text-transform:uppercase;}
  .detail-val{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-secondary);}
  .detail-notes{font-family:'Exo 2',sans-serif;font-size:14px;color:var(--tmi-text-secondary);font-style:italic;}
  .detail-mats-title{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--tmi-text-dim);text-transform:uppercase;margin-bottom:6px;}
  .detail-ing-row{display:flex;align-items:center;gap:12px;padding:5px 0;border-bottom:1px solid var(--tmi-border-dim);}
  .detail-ing-row:last-child{border-bottom:none;}
  .detail-ing-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:capitalize;min-width:120px;color:var(--tmi-text-primary);}
  .detail-needed{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-dim);min-width:90px;}
  .band-pills{display:flex;gap:6px;}
  .bp-pill{font-family:'Share Tech Mono',monospace;font-size:14px;padding:2px 10px;border:1px solid;}
  .bp-pill.p700{border-color:var(--tmi-gold-dark);color:var(--tmi-gold-dim);}
  .bp-pill.p700.suf{background:rgba(138,112,48,0.2);box-shadow:0 0 0 1px var(--tmi-gold-dark);}
  .bp-pill.p800{border-color:var(--tmi-border-dim);color:var(--tmi-text-dim);}
  .bp-pill.p800.suf{border-color:rgba(200,168,75,0.5);color:var(--tmi-gold);background:rgba(200,168,75,0.1);box-shadow:0 0 0 1px rgba(200,168,75,0.4);}
  .bp-pill.p900{border-color:var(--tmi-border-dim);color:var(--tmi-text-dim);}
  .bp-pill.p900.suf{border-color:rgba(232,201,106,0.5);color:var(--tmi-gold-bright);background:rgba(232,201,106,0.1);box-shadow:0 0 0 1px rgba(232,201,106,0.4);}
  .bp-pill.pasl{border-color:rgba(204,136,0,0.35);color:var(--tmi-warning);}
  .bp-pill.pasl.suf{background:rgba(204,136,0,0.12);box-shadow:0 0 0 1px rgba(204,136,0,0.4);}
  .asl-note{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-warning);margin-left:4px;}
  .ing-gem-tag{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--tmi-success);border:1px solid rgba(90,153,85,0.3);padding:2px 6px;margin-left:4px;}
  .readiness-row{display:flex;gap:6px;align-items:center;margin-top:10px;}
  .readiness-lbl{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--tmi-text-dim);text-transform:uppercase;margin-right:4px;}
  .rb{font-family:'Share Tech Mono',monospace;font-size:14px;padding:3px 12px;border:1px solid;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
  .rb.r700{border-color:var(--tmi-gold-dark);color:var(--tmi-gold-dim);background:rgba(138,112,48,0.08);}
  .rb.r700.on{border-color:rgba(138,112,48,0.7);color:var(--tmi-gold-dim);background:rgba(138,112,48,0.2);}
  .rb.r800{border-color:var(--tmi-border-dim);color:var(--tmi-text-dim);}
  .rb.r800.on{border-color:rgba(200,168,75,0.5);color:var(--tmi-gold);background:rgba(200,168,75,0.12);}
  .rb.r900{border-color:var(--tmi-border-dim);color:var(--tmi-text-dim);}
  .rb.r900.on{border-color:rgba(232,201,106,0.5);color:var(--tmi-gold-bright);background:rgba(232,201,106,0.12);}

  /* NEW ORDER FORM */
  .form-panel{padding:18px;}
  .form-title{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:3px;color:var(--tmi-gold-dim);text-transform:uppercase;margin-bottom:14px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;margin-bottom:14px;max-width:680px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.wide{grid-column:1/-1;}
  .form-label{font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--tmi-text-dim);text-transform:uppercase;}
  .form-input{background:var(--tmi-bg-card);border:1px solid var(--tmi-border-dim);color:var(--tmi-text-primary);font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 10px;outline:none;transition:border-color 0.15s;width:100%;}
  .form-input:focus{border-color:var(--tmi-border);}
  .form-input::placeholder{color:var(--tmi-text-dim);}
  .form-textarea{background:var(--tmi-bg-card);border:1px solid var(--tmi-border-dim);color:var(--tmi-text-primary);font-family:'Exo 2',sans-serif;font-size:14px;padding:8px 10px;outline:none;transition:border-color 0.15s;width:100%;resize:vertical;min-height:52px;}
  .form-textarea:focus{border-color:var(--tmi-border);}
  .form-textarea::placeholder{color:var(--tmi-text-dim);}
  .qual-select-row{display:flex;gap:8px;}
  .qual-opt{font-family:'Share Tech Mono',monospace;font-size:14px;padding:5px 18px;border:1px solid var(--tmi-border-dim);cursor:pointer;transition:all 0.15s;background:transparent;color:var(--tmi-text-dim);}
  .qual-opt:hover{border-color:var(--tmi-border);color:var(--tmi-text-secondary);}
  .qual-opt.sel.q500{border-color:var(--tmi-border);color:var(--tmi-text-secondary);background:rgba(208,196,176,0.1);}
  .qual-opt.sel.q700{border-color:var(--tmi-gold-dark);color:var(--tmi-gold-dim);background:rgba(138,112,48,0.15);}
  .qual-opt.sel.q800{border-color:var(--tmi-border);color:var(--tmi-gold);background:var(--tmi-gold-glow);}
  .qual-opt.sel.q900{border-color:rgba(232,201,106,0.5);color:var(--tmi-gold-bright);background:rgba(232,201,106,0.1);}
  .submit-btn{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--tmi-bg-deep);background:var(--tmi-gold);border:none;padding:9px 26px;cursor:pointer;text-transform:uppercase;transition:background 0.15s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
  .submit-btn:hover{background:var(--tmi-gold-bright);}

  /* PAST ORDERS */
  .past-bar{background:var(--tmi-bg-panel);border-bottom:1px solid var(--tmi-border-dim);padding:8px 18px;display:flex;align-items:center;gap:10px;}
  .past-info{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--tmi-text-dim);margin-left:auto;letter-spacing:1px;}
  .past-info span{color:var(--tmi-text-secondary);}

  /* TOAST */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--tmi-bg-panel);border:1px solid var(--tmi-gold-dark);color:var(--tmi-text-primary);font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:1px;padding:10px 18px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:opacity 0.3s;z-index:999;}
  .toast.hidden{opacity:0;pointer-events:none;}
</style>
</head>
<body>
<div class="page-wrap">

<div class="mod-header">
  <div>
    <div class="mod-eyebrow">TI Forgeworks — Custom Arms & Armor</div>
    <div class="mod-title">Order Tracker</div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-block">
    <span class="stat-val" id="stat-active">0</span>
    <span class="stat-lbl">Active</span>
  </div>
  <div class="stat-div"></div>
  <div class="stat-block">
    <span class="stat-val" id="stat-inprogress">0</span>
    <span class="stat-lbl">In Progress</span>
  </div>
  <div class="stat-div"></div>
  <div class="stat-block">
    <span class="stat-val" id="stat-ready">0</span>
    <span class="stat-lbl">Ready</span>
  </div>
  <div class="stat-div"></div>
  <div class="stat-block">
    <span class="stat-val" id="stat-delivered">0</span>
    <span class="stat-lbl">Delivered</span>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('orders')">Active Orders <span class="tab-count" id="tc-orders">0</span></div>
  <div class="tab" onclick="switchTab('new')">New Order</div>
  <div class="tab" onclick="switchTab('past')">Past Orders <span class="tab-count" id="tc-past">0</span></div>
</div>

<!-- VIEW A: ACTIVE ORDERS -->
<div class="view active" id="view-orders">
  <div class="order-bar">
    <span class="bar-label">Status</span>
    <button class="filter-btn active" onclick="setFilter('inprogress',this)">In Progress</button>
    <button class="filter-btn" onclick="setFilter('readytocraft',this)">Ready to Craft</button>
    <button class="filter-btn" onclick="setFilter('readytodeliver',this)">Ready to Deliver</button>
  </div>
  <div class="order-list" id="order-list"></div>
  <div class="order-empty" id="order-empty" style="display:none">NO ACTIVE ORDERS</div>
</div>

<!-- VIEW B: NEW ORDER -->
<div class="view" id="view-new">
  <div class="form-panel">
    <div class="form-title">Create New Order</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Customer</label>
        <input class="form-input" id="f-customer" placeholder="Handle or name...">
      </div>
      <div class="form-group">
        <label class="form-label">Blueprint</label>
        <input class="form-input" id="f-blueprint-search" placeholder="BLUEPRINT KEYWORD" onkeyup="filterBlueprintOptions(this.value)">
        <select class="form-select" id="f-blueprint">
          <option value="">Select blueprint...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quality Tier</label>
        <div class="qual-select-row">
          <button class="qual-opt q500" id="qt-500" onclick="selectQuality(500)">500</button>
          <button class="qual-opt q700 sel" id="qt-700" onclick="selectQuality(700)">700</button>
          <button class="qual-opt q800" id="qt-800" onclick="selectQuality(800)">800</button>
          <button class="qual-opt q900" id="qt-900" onclick="selectQuality(900)">900</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Deadline (optional)</label>
        <input class="form-input" id="f-deadline" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Trade Agreed</label>
        <input class="form-input" id="f-trade" type="text" placeholder="aUEC, items, or other terms...">
      </div>
      <div class="form-group wide">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Special requests, delivery location, other details..."></textarea>
      </div>
    </div>
    <button class="submit-btn" onclick="submitOrder()">Create Order</button>
  </div>
</div>

<!-- VIEW C: PAST ORDERS -->
<div class="view" id="view-past">
  <div class="past-bar">
    <span class="bar-label">Order History</span>
    <span class="past-info">Showing <span id="past-count">0</span> delivered orders</span>
  </div>
  <div class="order-list" id="past-list"></div>
  <div class="order-empty" id="past-empty" style="display:none">NO PAST ORDERS</div>
</div>

</div><!-- /page-wrap -->
<div class="toast hidden" id="toast"></div>

<script>
const GEM_NAMES=new Set(['hadanite','janalite','dolvine','aphorite','sadaryx','carinite','beradom','jaclium','saldynium','feynmaline','glacosite']);
const LS_TRACKING='forgex-tracking';
const LS_ORDERS='forgex-active-orders';
const LS_ALL_ORDERS='forgex-all-orders';
function writeActiveOrders(){
  localStorage.setItem(LS_ORDERS,JSON.stringify(orders.filter(o=>o.status!=='delivered')));
  localStorage.setItem(LS_ALL_ORDERS,JSON.stringify(orders));
}

function loadBlueprints(){
  try{const s=JSON.parse(localStorage.getItem('forgex-blueprints')||'null');if(s&&Array.isArray(s)&&s.length)return s;}catch(e){}
  return [];
}
function loadOwnedIds(){
  try{const ownedList=JSON.parse(localStorage.getItem('forgex-owned')||'[]');if(Array.isArray(ownedList)) return new Set(ownedList);}catch(e){}
  return new Set();
}
const blueprints=loadBlueprints();
const ownedIds=loadOwnedIds();

function loadInventory(){
  try{const s=JSON.parse(localStorage.getItem('forgex-lots')||'null');if(s&&Array.isArray(s.lots))return s.lots;if(Array.isArray(s))return s;}catch(e){}
  return [];
}
let inventory=loadInventory();

function loadOrders(){
  try{
    let s=JSON.parse(localStorage.getItem(LS_ALL_ORDERS)||'null');
    if(s&&Array.isArray(s))return s;
    // Fallback: if all-orders doesn't exist, load from active-orders (migration)
    s=JSON.parse(localStorage.getItem(LS_ORDERS)||'null');
    if(s&&Array.isArray(s))return s;
  }catch(e){}
  return [];
}
let orders=loadOrders();
let nextId=orders.length?Math.max(...orders.map(o=>o.id))+1:1;
let statusFilter='all';
let selectedQuality=700;
let expanded=new Set();
let pendingDelete=null;

/* ── LOCALSTORAGE TRACKING BRIDGE ──
   Module 04 reads forgex-tracking to know which blueprints have
   order:true set, and will add those quantities to Material Needs.
   Format: { [bpId]: { personal: bool, order: bool } }            */
function readTracking(){
  try{return JSON.parse(localStorage.getItem(LS_TRACKING)||'{}')}catch{return{};}
}
function writeTracking(t){localStorage.setItem(LS_TRACKING,JSON.stringify(t));}

function setOrderTracked(bpId){
  const t=readTracking();
  if(!t[bpId]) t[bpId]={personal:false,order:false};
  t[bpId].order=true;
  writeTracking(t);
}

function syncOrderTracking(bpId){
  const stillActive=orders.some(o=>o.bpId===bpId&&o.status!=='delivered');
  const t=readTracking();
  if(!t[bpId]) return;
  t[bpId].order=stillActive;
  // If neither personal nor order, remove the entry entirely
  if(!t[bpId].personal&&!t[bpId].order) delete t[bpId];
  writeTracking(t);
}

/* ── BLUEPRINT LABEL ── */
function getBpLabel(bp){
  if(bp.type==='Armor')
    return `${bp.base}${bp.slot?' '+bp.slot:''}${bp.finish?' '+bp.finish:''}`.trim();
  if(bp.type==='Weapon')
    return `${bp.base}${bp.weapon_type?' '+bp.weapon_type:''}${bp.finish?' '+bp.finish:''}`.trim();
  return `${bp.base}${bp.ammo_type?' '+bp.ammo_type:''}`.trim();
}

/* ── INIT ── */
let allBpOptions=[];
function init(){
  const sel=document.getElementById('f-blueprint');
  const ownedBps=blueprints.filter(bp=>ownedIds.has(bp.id)&&bp.type!=='Ammo').sort((a,b)=>getBpLabel(a).localeCompare(getBpLabel(b)));
  allBpOptions=ownedBps.map(bp=>({id:bp.id,label:getBpLabel(bp),bp}));
  allBpOptions.forEach(opt=>{
    const optEl=document.createElement('option');
    optEl.value=opt.id;
    optEl.textContent=opt.label;
    sel.appendChild(optEl);
  });
  const activeBpIds=new Set(orders.filter(o=>o.status!=='delivered').map(o=>o.bpId));
  activeBpIds.forEach(id=>setOrderTracked(id));
  renderOrders();
}

function filterBlueprintOptions(query){
  const sel=document.getElementById('f-blueprint');
  const searchInput=query.toLowerCase();
  sel.innerHTML='<option value="">Select blueprint...</option>';
  const filtered=allBpOptions.filter(opt=>opt.label.toLowerCase().includes(searchInput));
  filtered.forEach(opt=>{
    const optEl=document.createElement('option');
    optEl.value=opt.id;
    optEl.textContent=opt.label;
    sel.appendChild(optEl);
  });
}

/* ── TABS ── */
function switchTab(tab){
  ['orders','new','past'].forEach(v=>document.getElementById('view-'+v).classList.toggle('active',v===tab));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['orders','new','past'][i]===tab));
  // Reload orders from localStorage to ensure fresh data from other modules
  orders=loadOrders();
  if(tab==='past') renderPast();
  if(tab==='orders') renderOrders();
}

/* ── STATS ── */
function updateStats(){
  const active=orders.filter(o=>o.status!=='delivered');
  document.getElementById('stat-active').textContent=active.length;
  document.getElementById('stat-inprogress').textContent=orders.filter(o=>o.status==='inprogress').length;
  document.getElementById('stat-ready').textContent=orders.filter(o=>o.status==='readytocraft').length;
  document.getElementById('stat-delivered').textContent=orders.filter(o=>o.status==='delivered').length;
  document.getElementById('tc-orders').textContent=active.length;
  document.getElementById('tc-past').textContent=orders.filter(o=>o.status==='delivered').length;
}

/* ── FILTER ── */
function setFilter(s,btn){
  statusFilter=s;
  document.querySelectorAll('.order-bar .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

/* ── INVENTORY HELPERS ── */
function getBands(ore){
  const lots=inventory.filter(l=>l.ore===ore);
  return{
    b700:lots.filter(l=>l.quality>=700&&l.quality<800).reduce((s,l)=>s+l.qty,0),
    b800:lots.filter(l=>l.quality>=800&&l.quality<900).reduce((s,l)=>s+l.qty,0),
    b900:lots.filter(l=>l.quality>=900).reduce((s,l)=>s+l.qty,0),
    total500plus:lots.filter(l=>l.quality>=500).reduce((s,l)=>s+l.qty,0),
  };
}

function checkReady(bp,qty,band){
  const aslIng=bp.ingredients.find(i=>i.name==='aslarite');
  if(aslIng&&getBands('aslarite').total500plus<aslIng.qty*qty) return false;
  return bp.ingredients.filter(i=>i.name!=='aslarite').every(ing=>{
    const b=getBands(ing.name);
    const have=band===700?b.b700:band===800?b.b800:b.b900;
    return have>=ing.qty*qty;
  });
}

/* ── STATUS PIPELINE ── */
const STATUS_NEXT={inprogress:'readytocraft',readytocraft:'readytodeliver',readytodeliver:'delivered'};
const STATUS_PREV={readytocraft:'inprogress',readytodeliver:'readytocraft',delivered:'readytodeliver'};
const STATUS_LABELS={inprogress:'In Progress',readytocraft:'Ready to Craft',readytodeliver:'Ready to Deliver',delivered:'Delivered'};
const STATUS_NEXT_LABEL={inprogress:'Mark Ready to Craft',readytocraft:'Mark Ready to Deliver',readytodeliver:'Mark Delivered'};
const STATUS_PREV_LABEL={readytocraft:'← Revert to In Progress',readytodeliver:'← Revert to Ready to Craft',delivered:'← Revert to Ready to Deliver'};

/* ── VIEW A: ACTIVE ORDERS ── */
function renderOrders(){
  updateStats();
  const list=document.getElementById('order-list');
  const empty=document.getElementById('order-empty');
  const active=orders.filter(o=>o.status!=='delivered');

  // Auto-transition: if inprogress and all materials ready, move to readytocraft
  active.forEach(order=>{
    if(order.status==='inprogress'){
      const bp=blueprints.find(b=>b.id===order.bpId);
      if(bp&&checkReady(bp,1,order.quality)){
        order.status='readytocraft';
      }
    }
  });
  writeActiveOrders();

  const filtered=statusFilter==='inprogress'?active.filter(o=>o.status==='inprogress'):statusFilter==='readytocraft'?active.filter(o=>o.status==='readytocraft'):statusFilter==='readytodeliver'?active.filter(o=>o.status==='readytodeliver'):active;
  if(!filtered.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  list.innerHTML=filtered.map(order=>orderRowHtml(order,true)).join('');
}

function orderRowHtml(order,showActions){
  const bp=blueprints.find(b=>b.id===order.bpId);
  const isExp=expanded.has(order.id);
  const matReady=bp?checkReady(bp,1,order.quality):false;
  const nextStatus=STATUS_NEXT[order.status];
  const dlClass=deadlineClass(order.deadline,order.status);

  return`<div class="order-row s-${order.status}">
    <div class="order-header" onclick="toggleExpand(${order.id})">
      <span class="order-id">#${String(order.id).padStart(3,'0')}</span>
      <span class="order-customer">${order.customer}</span>
      <span class="order-item">${bp?getBpLabel(bp):'Unknown'}</span>
      <span class="qual-badge qual-${order.quality}">${order.quality}+</span>
      <span class="status-pill status-${order.status}" ${order.status==='readytocraft'?`onclick="event.stopPropagation();goToCraftWorkbench(${order.id})" style="cursor:pointer"`:''}>${STATUS_LABELS[order.status]}</span>
      <span class="order-deadline${dlClass?' '+dlClass:''}">${order.deadline||'—'}</span>
      <span class="expand-arrow">${isExp?'▲':'▼'}</span>
    </div>
    <div class="order-detail${isExp?' open':''}">
      ${renderDetail(order,bp)}
    </div>
  </div>`;
}

function renderDetail(order,bp){
  const trade=order.trade||'—';
  let matHtml='';
  if(bp){
    const qty=1;
    const ings=bp.ingredients.map(ing=>{
      const isAsl=ing.name==='aslarite';
      const need=ing.qty*qty;
      if(isAsl){
        const b=getBands('aslarite');
        const suf=b.total500plus>=need;
        return`<div class="detail-ing-row">
          <span class="detail-ing-name">${ing.name}<span class="asl-note">500+</span></span>
          <span class="detail-needed">Need ${need} cSCU</span>
          <div class="band-pills"><span class="bp-pill pasl${suf?' suf':''}">${b.total500plus} avail${suf?' ✓':''}</span></div>
        </div>`;
      }
      const b=getBands(ing.name);
      const s7=b.b700>=need,s8=b.b800>=need,s9=b.b900>=need;
      const gemTag=GEM_NAMES.has(ing.name)?'<span class="ing-gem-tag">GEM</span>':'';
      return`<div class="detail-ing-row">
        <span class="detail-ing-name">${ing.name}${gemTag}</span>
        <span class="detail-needed">Need ${need} cSCU</span>
        <div class="band-pills">
          <span class="bp-pill p700${s7?' suf':''}">${b.b700}${s7?' ✓':''}</span>
          <span class="bp-pill p800${s8?' suf':''}">${b.b800}${s8?' ✓':''}</span>
          <span class="bp-pill p900${s9?' suf':''}">${b.b900}${s9?' ✓':''}</span>
        </div>
      </div>`;
    }).join('');
    const q=order.quality;
    const qReady=checkReady(bp,qty,q);
    const qClass=q===700?'r700':q===800?'r800':'r900';
    matHtml=`<div class="detail-mats-title">Material Requirements</div>${ings}
    <div class="readiness-row">
      <span class="readiness-lbl">Readiness at ${q}</span>
      <span class="rb ${qClass}${qReady?' on':''}">${q}${qReady?' ✓':' — insufficient materials'}</span>
    </div>`;
  }
  const notesHtml=order.notes?`<div class="detail-field wide" style="grid-column:1/-1"><span class="detail-lbl">Notes</span><span class="detail-notes">"${order.notes}"</span></div>`:'';
  const nextStatus=STATUS_NEXT[order.status];
  const prevStatus=STATUS_PREV[order.status];
  const isPendingDelete=pendingDelete===order.id;
  const actionsHtml=`<div class="detail-actions" onclick="event.stopPropagation()">
    ${nextStatus?`<button class="action-btn ${order.status==='ready'?'deliver':'advance'}" onclick="advanceStatus(${order.id})">${STATUS_NEXT_LABEL[order.status]}</button>`:''}
    ${prevStatus?`<button class="action-btn revert" onclick="revertStatus(${order.id})">${STATUS_PREV_LABEL[order.status]}</button>`:''}
    <span style="flex:1"></span>
    ${isPendingDelete
      ?`<button class="action-btn confirm-delete" onclick="confirmDelete(${order.id})">Confirm Delete</button>
        <button class="action-btn" onclick="cancelDelete()">Cancel</button>`
      :`<button class="action-btn delete-order" onclick="startDelete(${order.id})">Delete Order</button>`}
  </div>`;
  return`<div class="detail-grid">
    <div class="detail-field"><span class="detail-lbl">Order ID</span><span class="detail-val">#${String(order.id).padStart(3,'0')}</span></div>
    <div class="detail-field"><span class="detail-lbl">Trade Agreed</span><span class="detail-val">${trade}</span></div>
    <div class="detail-field"><span class="detail-lbl">Created</span><span class="detail-val">${order.created}</span></div>
    <div class="detail-field"><span class="detail-lbl">Deadline</span><span class="detail-val">${order.deadline||'—'}</span></div>
    ${notesHtml}
  </div>${matHtml}${actionsHtml}`;
}

function toggleExpand(id){expanded.has(id)?expanded.delete(id):expanded.add(id);renderOrders();renderPast();}

function advanceStatus(id){
  const o=orders.find(o=>o.id===id);
  if(!o||!STATUS_NEXT[o.status]) return;
  o.status=STATUS_NEXT[o.status];
  if(o.status==='delivered') syncOrderTracking(o.bpId);
  writeActiveOrders();
  renderOrders();renderPast();
  toast(`ORDER #${String(id).padStart(3,'0')} → ${STATUS_LABELS[o.status].toUpperCase()}`);
}

function revertStatus(id){
  const o=orders.find(o=>o.id===id);
  if(!o||!STATUS_PREV[o.status]) return;
  const wasDelivered=o.status==='delivered';
  o.status=STATUS_PREV[o.status];
  if(wasDelivered) setOrderTracked(o.bpId);
  writeActiveOrders();
  renderOrders();renderPast();
  toast(`ORDER #${String(id).padStart(3,'0')} ← REVERTED TO ${STATUS_LABELS[o.status].toUpperCase()}`);
}

function startDelete(id){pendingDelete=id;renderOrders();renderPast();}
function cancelDelete(){pendingDelete=null;renderOrders();renderPast();}
function confirmDelete(id){
  const o=orders.find(o=>o.id===id);
  orders=orders.filter(o=>o.id!==id);
  expanded.delete(id);
  pendingDelete=null;
  if(o) syncOrderTracking(o.bpId);
  writeActiveOrders();
  renderOrders();renderPast();
  toast('ORDER DELETED');
}

/* ── VIEW B: NEW ORDER ── */
function selectQuality(q){
  selectedQuality=q;
  [700,800,900].forEach(v=>document.getElementById('qt-'+v).classList.toggle('sel',v===q));
}

function submitOrder(){
  const customer=document.getElementById('f-customer').value.trim();
  const bpId=parseInt(document.getElementById('f-blueprint').value);
  const trade=document.getElementById('f-trade').value.trim();
  const deadline=document.getElementById('f-deadline').value;
  const notes=document.getElementById('f-notes').value.trim();

  if(!customer){toast('ENTER CUSTOMER NAME');return;}
  if(!bpId){toast('SELECT A BLUEPRINT');return;}

  const today=new Date().toISOString().split('T')[0];
  orders.push({id:nextId++,customer,bpId,quality:selectedQuality,status:'inprogress',created:today,deadline,trade,notes});
  setOrderTracked(bpId);
  writeActiveOrders();

  document.getElementById('f-customer').value='';
  document.getElementById('f-blueprint').value='';
  document.getElementById('f-trade').value='';
  document.getElementById('f-deadline').value='';
  document.getElementById('f-notes').value='';
  selectQuality(700);

  toast('ORDER CREATED — BLUEPRINT TRACKING UPDATED');
  switchTab('orders');
}

/* ── VIEW C: PAST ORDERS ── */
function renderPast(){
  updateStats();
  const list=document.getElementById('past-list');
  const empty=document.getElementById('past-empty');
  const past=orders.filter(o=>o.status==='delivered');
  document.getElementById('past-count').textContent=past.length;
  if(!past.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=past.map(order=>orderRowHtml(order,false)).join('');
}

/* ── HELPERS ── */
function deadlineClass(deadline,status){
  if(!deadline||status==='delivered') return '';
  const today=new Date();today.setHours(0,0,0,0);
  const dl=new Date(deadline);
  const diff=Math.floor((dl-today)/(864e5));
  if(diff<0) return 'overdue';
  if(diff<=3) return 'near';
  return '';
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.remove('hidden');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.add('hidden'),2500);
}

/* ── NAVIGATION TO WORKBENCH ── */
function goToCraftWorkbench(orderId){
  const order=orders.find(o=>o.id===orderId);
  if(!order) return;
  localStorage.setItem('forgex-forge-preselect',order.bpId);
  localStorage.setItem('forgex-attach-order',orderId);
  // Navigate via parent dashboard postMessage
  window.parent.postMessage({type:'forgex-navigate',src:'forgeworks_forge.html'},'*');
}

init();
</script>
